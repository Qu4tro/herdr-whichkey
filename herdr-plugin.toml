# herdr-plugin.toml — manifest for herdr-whichkey.
#
# A blezz/which-key-style single-keystroke action menu, rendered as a bottom
# strip in a split plugin pane. The keybinding invokes the `open` action; its
# launcher script opens the pane and stays alive until the menu closes,
# because herdr can tear transient plugin views down when the invoking action
# exits (see docs/spike-popup-panes.md).

id = "herdr-whichkey"
name = "herdr-whichkey"
version = "0.2.0"
description = "blezz/which-key-style single-keystroke action menu: one trigger key, then a hint strip and one keystroke per action."
min_herdr_version = "0.7.0"
platforms = ["linux", "macos"]

# Fetch a prebuilt release binary for this host, or fall back to cargo.
[[build]]
command = ["bash", "scripts/build.sh"]

# The menu strip. Opened by the launcher with --placement split
# --direction down; the binary then shrinks itself to strip height
# (popups can only float centered on 0.7.4 — live-UX finding).
[[panes]]
id = "menu"
title = "whichkey"
placement = "split"
command = ["./target/release/herdr-whichkey", "menu"]

# The action a [[keys.command]] binding references as `herdr-whichkey.open`.
[[actions]]
id = "open"
title = "Open the whichkey menu"
description = "Show the single-keystroke action strip for the focused workspace."
command = ["bash", "scripts/open-menu.sh"]
