# Tag v* → build the four supported triples on native runners, publish a
# GitHub release with tarballs + SHA256SUMS, then commit those sums into
# scripts/build.sh so installs pick up the prebuilts. That last step used
# to be a manual copy and was missed twice; see the pin job below.
#
# ubuntu-24.04-arm is free for public repos only — tag releases after the
# repo is public, or that job won't schedule.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: toolchain
        run: rustup update --no-self-update stable && rustup default stable
      - name: test
        run: cargo test --release --locked
      - name: build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: package
        run: >
          tar -C target/${{ matrix.target }}/release -czf
          herdr-whichkey-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          herdr-whichkey
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: checksums
        run: sha256sum ./*.tar.gz > SHA256SUMS
      - name: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME" ./*.tar.gz SHA256SUMS
          --repo "$GITHUB_REPOSITORY"
          --title "herdr-whichkey $GITHUB_REF_NAME"
          --generate-notes

  # A tarball's checksum does not exist until the tarball is built, so the
  # tagged commit cannot carry its own pins — they land on main afterwards.
  # Left to a human this is forgotten silently: build.sh falls back to a
  # source build and no install fails, so nothing surfaces it.
  pin:
    needs: release
    runs-on: ubuntu-24.04
    # Two releases published close together would otherwise race, and the
    # loser's commit could be the one that lands. Queue instead of cancel:
    # every release still gets its turn, and the version guard in
    # pin-release.sh rejects any that turns out to be a downgrade.
    concurrency:
      group: pin-checksums
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: pin checksums
        run: scripts/pin-release.sh "$GITHUB_REF_NAME"
      - name: commit
        run: |
          if git diff --quiet scripts/build.sh; then
            echo "pins already current for $GITHUB_REF_NAME"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "build: pin $GITHUB_REF_NAME prebuilt checksums" scripts/build.sh
          git push origin main
