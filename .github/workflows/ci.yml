# Push/PR gate: formatting, lints, tests. The release workflow re-runs the
# tests on every target triple; this one only needs a single runner, so it
# checks the things that are host-independent and fails fast.
#
# The checks themselves live in the justfile at the repo root — this file
# only sets the machine up and calls `just ci`. Deliberately no copy of the
# commands here: `just ci` on a laptop is the gate, not an approximation of
# it. Edit the justfile to change what is checked.
name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: toolchain
        run: >
          rustup update --no-self-update stable && rustup default stable
          && rustup component add rustfmt clippy
      - name: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      # Not on the image, but packaged in noble universe — an apt line beats
      # a marketplace action for something this small. shellcheck itself is
      # preinstalled.
      - name: just
        run: sudo apt-get update && sudo apt-get install -y just
      - name: ci
        run: just ci
